# Sections configuration for git-commit-helper skill
# Load sections on-demand based on user needs

sections:
  - id: conventional-commits
    file: sections/conventional-commits.md
    description: Complete reference for Conventional Commits format
    load_when: User asks about commit format or needs format explanation

  - id: commit-types
    file: sections/commit-types.md
    description: List of commit types with descriptions and examples
    load_when: User unsure which type to use

  - id: best-practices
    file: sections/best-practices.md
    description: Guidelines for writing effective commit messages
    load_when: User wants to improve commit message quality

  - id: workflow
    file: sections/workflow.md
    description: Step-by-step workflow for analyzing and committing
    load_when: User needs guidance on the commit process

checklists:
  - id: quality
    file: checklists/quality.md
    description: Quality validation checklist for commit messages
    load_when: Before finalizing any commit message suggestion

references:
  - id: examples
    file: references/examples.md
    description: Real-world examples of good commit messages
    load_when: User asks for examples or inspiration
